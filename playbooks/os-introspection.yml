---
- name: OS Introspection
  hosts: all
  gather_facts: true

  tasks:
    - name: Get system uptime
      ansible.builtin.command: uptime
      register: uptime_output

    - name: Get disk usage
      ansible.builtin.command: df -h
      register: disk_output

    - name: Get memory usage
      ansible.builtin.command: free -m
      register: memory_output

    - name: Get top CPU consuming processes
      ansible.builtin.shell: ps aux --sort=-%cpu | head -10
      register: cpu_output

    - name: Get recent journal errors
      ansible.builtin.command: journalctl -p err --since "1 hour ago" --no-pager
      register: journal_output

    - name: Display OS findings
      ansible.builtin.debug:
        msg:
          uptime: "{{ uptime_output.stdout }}"
          disk: "{{ disk_output.stdout }}"
          memory: "{{ memory_output.stdout }}"
          top_cpu: "{{ cpu_output.stdout }}"
          recent_errors: "{{ journal_output.stdout }}"
